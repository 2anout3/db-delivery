<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Назначение курьера</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <div id="topbar"></div>
      <section class="card">
        <h1>Назначение курьера</h1>
        <p class="muted">Экран доступен сотрудникам и администраторам.</p>
        <div id="message" class="message hidden"></div>
        <form id="assignForm" class="layout">
          <div class="grid-2">
            <div>
              <label for="request_id">Курьерская заявка</label>
              <select id="request_id" name="request_id" required></select>
            </div>
            <div>
              <label for="courier_id">Курьер</label>
              <select id="courier_id" name="courier_id" required></select>
            </div>
          </div>
          <div class="grid-2">
            <div>
              <label for="client_id">Клиент услуги</label>
              <select id="client_id" name="client_id" required disabled></select>
            </div>
            <div>
              <label for="service_type">Тип услуги</label>
              <select id="service_type" name="service_type" required disabled>
                <option value="pickup">pickup</option>
                <option value="delivery">delivery</option>
              </select>
            </div>
          </div>
          <div class="grid-2">
            <div>
              <label for="service_cost">Стоимость услуги</label>
              <input id="service_cost" name="service_cost" type="number" step="0.01" required />
            </div>
          </div>
          <div class="card">
            <h3>Адрес вызова курьера</h3>
            <div class="grid-3">
              <input name="city" placeholder="Город" required readonly />
              <input name="street" placeholder="Улица" required readonly />
              <input name="house" placeholder="Дом" required readonly />
              <input name="apartment" placeholder="Квартира" readonly />
              <input name="postal_code" placeholder="Индекс" required readonly />
              <input name="comment" placeholder="Комментарий" readonly />
            </div>
          </div>
          <button type="submit">Назначить</button>
        </form>
      </section>
    </main>

    <script type="module">
      import { api } from "/static/api/client.js";
      import { hideMessage, renderTopbar, requireSession, showMessage } from "/static/components/layout.js";

      const profile = await requireSession({ permission: "can_assign_courier" });
      if (!profile) {
        throw new Error("Unauthorized");
      }

      renderTopbar(document.getElementById("topbar"), profile);

      const form = document.getElementById("assignForm");
      const message = document.getElementById("message");
      const requestSelect = document.getElementById("request_id");
      const courierSelect = document.getElementById("courier_id");
      const clientSelect = document.getElementById("client_id");
      const serviceTypeSelect = document.getElementById("service_type");
      const serviceCostInput = document.getElementById("service_cost");
      const params = new URLSearchParams(window.location.search);
      let openRequests = [];

      function getAddressText(address) {
        return `${address.city}, ${address.street}, ${address.house}`;
      }

      function fillRequestFields(request) {
        if (!request) {
          return;
        }
        clientSelect.value = String(request.client_id);
        serviceTypeSelect.value = request.service_type;
        form.elements.city.value = request.call_address.city;
        form.elements.street.value = request.call_address.street;
        form.elements.house.value = request.call_address.house;
        form.elements.apartment.value = request.call_address.apartment || "";
        form.elements.postal_code.value = request.call_address.postal_code || "";
        form.elements.comment.value = request.call_address.comment || "";
        serviceCostInput.value = request.service_cost || "0.00";
      }

      async function loadData() {
        hideMessage(message);
        try {
          const [deliveries, couriers, clients] = await Promise.all([
            api.listDeliveries(),
            api.listCouriers(),
            api.listClients(),
          ]);

          openRequests = deliveries.flatMap((delivery) =>
            delivery.assignments
              .filter((assignment) => assignment.courier_id === null)
              .map((assignment) => ({ delivery, assignment }))
          );

          requestSelect.innerHTML = openRequests
            .map(({ delivery, assignment }) => {
              return `<option value="${assignment.assignment_id}">#${delivery.delivery_id} ${delivery.tracking_number} — ${assignment.service_type} — ${getAddressText(assignment.call_address)}</option>`;
            })
            .join("");
          courierSelect.innerHTML = couriers
            .map((item) => `<option value="${item.employee_id}">${item.full_name} (${item.transport_type})</option>`)
            .join("");
          clientSelect.innerHTML = clients
            .map((item) => `<option value="${item.client_id}">${item.person.full_name}</option>`)
            .join("");

          const preselectedDelivery = params.get("delivery_id");
          if (preselectedDelivery) {
            const preselected = openRequests.find((item) => item.delivery.delivery_id === Number(preselectedDelivery));
            if (preselected) {
              requestSelect.value = String(preselected.assignment.assignment_id);
            }
          }

          form.querySelector("button[type='submit']").disabled = openRequests.length === 0;
          if (!openRequests.length) {
            showMessage(message, "Открытых курьерских заявок нет.", "");
            return;
          }

          fillRequestFields(openRequests.find((item) => item.assignment.assignment_id === Number(requestSelect.value))?.assignment);
        } catch (error) {
          showMessage(message, error.message, "error");
        }
      }

      requestSelect.addEventListener("change", () => {
        const selected = openRequests.find((item) => item.assignment.assignment_id === Number(requestSelect.value));
        fillRequestFields(selected?.assignment);
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        hideMessage(message);
        try {
          const entries = new FormData(form);
          const selected = openRequests.find((item) => item.assignment.assignment_id === Number(entries.get("request_id")));
          if (!selected) {
            throw new Error("Выберите открытую курьерскую заявку");
          }
          const deliveryId = selected.delivery.delivery_id;
          const assignment = selected.assignment;
          const payload = {
            courier_id: Number(entries.get("courier_id")),
            client_id: assignment.client_id,
            service_type: assignment.service_type,
            service_cost: entries.get("service_cost"),
            call_address: {
              city: assignment.call_address.city,
              street: assignment.call_address.street,
              house: assignment.call_address.house,
              apartment: assignment.call_address.apartment || "",
              postal_code: assignment.call_address.postal_code || "",
              comment: assignment.call_address.comment || "",
            },
          };
          await api.assignCourier(deliveryId, payload);
          showMessage(message, "Курьер назначен", "success");
          await loadData();
        } catch (error) {
          showMessage(message, error.message, "error");
        }
      });

      loadData();
    </script>
  </body>
</html>
