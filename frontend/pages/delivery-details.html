<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Детали доставки</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <div id="topbar"></div>
      <section class="card">
        <div class="section-head">
          <div>
            <h1>Детали доставки</h1>
            <p class="muted">Полная карточка заказа, участников и этапов обработки.</p>
          </div>
        </div>
        <div id="message" class="message hidden"></div>
        <div id="deliveryInfo" class="detail-grid"></div>
      </section>

      <section class="card">
        <h2>Участники доставки</h2>
        <div id="participants" class="detail-grid"></div>
      </section>

      <section id="courierRequestSection" class="card hidden">
        <h2>Курьерская доставка получателю</h2>
        <form id="courierRequestForm" class="layout">
          <div class="grid-3">
            <input name="city" placeholder="Город" required readonly />
            <input name="street" placeholder="Улица" required />
            <input name="house" placeholder="Дом" required />
            <input name="apartment" placeholder="Квартира" />
            <input name="postal_code" placeholder="Индекс" required />
            <input name="comment" placeholder="Комментарий" />
          </div>
          <button type="submit">Запросить курьера</button>
        </form>
      </section>

      <section class="card">
        <h2>Назначения курьеров</h2>
        <div id="courierActions" class="actions"></div>
        <div id="assignmentsList" class="list"></div>
      </section>

      <section class="card">
        <h2>История статусов</h2>
        <div id="historyList" class="list"></div>
      </section>

      <section id="statusSection" class="card hidden">
        <h2>Изменить статус</h2>
        <form id="statusForm" class="grid-2">
          <div>
            <label for="new_status_id">Новый статус</label>
            <select id="new_status_id" name="new_status_id" required></select>
          </div>
          <div>
            <label for="comment">Комментарий</label>
            <input id="comment" name="comment" />
          </div>
          <button type="submit">Сохранить</button>
        </form>
      </section>
    </main>

    <script type="module">
      import { api } from "/static/api/client.js";
      import { hideMessage, renderTopbar, requireSession, showMessage } from "/static/components/layout.js";

      const profile = await requireSession();
      if (!profile) {
        throw new Error("Unauthorized");
      }

      renderTopbar(document.getElementById("topbar"), profile);

      const params = new URLSearchParams(window.location.search);
      const deliveryId = params.get("id");
      const message = document.getElementById("message");
      const deliveryInfo = document.getElementById("deliveryInfo");
      const participants = document.getElementById("participants");
      const assignmentsList = document.getElementById("assignmentsList");
      const historyList = document.getElementById("historyList");
      const statusSection = document.getElementById("statusSection");
      const statusForm = document.getElementById("statusForm");
      const statusSelect = document.getElementById("new_status_id");
      const courierRequestSection = document.getElementById("courierRequestSection");
      const courierRequestForm = document.getElementById("courierRequestForm");
      const courierActions = document.getElementById("courierActions");
      let currentDelivery = null;
      let currentStatuses = [];

      function syncRecipientCourierCity(delivery) {
        const city = delivery.destination_branch.address.city;
        courierRequestForm.elements.city.value = city;
      }

      function renderDelivery(delivery) {
        deliveryInfo.innerHTML = `
          <div class="list-item"><strong>ID</strong><br />${delivery.delivery_id}</div>
          <div class="list-item"><strong>Трек-номер</strong><br />${delivery.tracking_number}</div>
          <div class="list-item"><strong>Статус</strong><br />${delivery.current_status.name}</div>
          <div class="list-item"><strong>Маршрут</strong><br />${delivery.origin_branch.name} → ${delivery.destination_branch.name}</div>
          <div class="list-item"><strong>Вес</strong><br />${delivery.declared_weight_kg} кг</div>
          <div class="list-item"><strong>Стоимость</strong><br />${delivery.total_cost}<br /><span class="muted">База: ${delivery.base_cost} · Страховка: ${delivery.extra_cost}</span></div>
          <div class="list-item"><strong>Курьер у отправителя</strong><br />${delivery.sender_courier_required ? "Нужен" : "Не нужен"}</div>
          <div class="list-item"><strong>Курьер получателю</strong><br />${delivery.recipient_courier_required ? "Запрошен" : "Не запрошен"}</div>
          <div class="list-item"><strong>Описание</strong><br />${delivery.description}</div>
          <div class="list-item"><strong>Создана</strong><br />${new Date(delivery.created_at).toLocaleString()}</div>
        `;
      }

      function renderParticipants(delivery) {
        participants.innerHTML = `
          <article class="list-item">
            <strong>Отправитель</strong><br />
            ${delivery.sender.person.full_name}<br />
            <span class="muted">${delivery.sender.person.phone} · ${delivery.sender.person.email}</span>
          </article>
          <article class="list-item">
            <strong>Получатель</strong><br />
            ${delivery.recipient.person.full_name}<br />
            <span class="muted">${delivery.recipient.person.phone} · ${delivery.recipient.person.email}</span>
          </article>
          <article class="list-item">
            <strong>${delivery.sender_courier_required ? "Адрес забора у отправителя" : "Филиал отправления"}</strong><br />
            ${delivery.sender_address.city}, ${delivery.sender_address.street}, ${delivery.sender_address.house}
          </article>
          <article class="list-item">
            <strong>Филиал получения</strong><br />
            ${delivery.recipient_address.city}, ${delivery.recipient_address.street}, ${delivery.recipient_address.house}
          </article>
          ${
            delivery.recipient_courier_address
              ? `<article class="list-item">
                  <strong>Адрес курьера получателю</strong><br />
                  ${delivery.recipient_courier_address.city}, ${delivery.recipient_courier_address.street}, ${delivery.recipient_courier_address.house}
                </article>`
              : ""
          }
        `;
      }

      function renderAssignments(assignments) {
        if (!assignments.length) {
          assignmentsList.innerHTML = `<article class="list-item muted">Курьер еще не назначен.</article>`;
          return;
        }

        assignmentsList.innerHTML = assignments
          .map(
            (item) => `
              <article class="list-item">
                <strong>${item.courier_id ? `Курьер #${item.courier_id}` : "Курьер ожидает назначения"}</strong><br />
                <span class="muted">Услуга: ${item.service_type} · Стоимость: ${item.service_cost}</span><br />
                ${item.courier_id ? `Назначен: ${new Date(item.assigned_at).toLocaleString()}` : "Заявка создана"}
              </article>
            `
          )
          .join("");
      }

      function canSelfAssignDelivery(delivery) {
        return (
          profile.effective_role === "courier" &&
          Number(delivery.declared_weight_kg) <= Number(profile.capacity_kg) &&
          delivery.assignments.some(
            (assignment) =>
              assignment.courier_id === null &&
              assignment.call_address.city === profile.branch?.address?.city &&
              (
                (
                  assignment.service_type === "pickup" &&
                  delivery.current_status.code === "WAITING_COURIER" &&
                  delivery.origin_branch.branch_id === profile.branch_id
                ) ||
                (
                  assignment.service_type === "delivery" &&
                  delivery.current_status.code === "AT_DESTINATION_BRANCH" &&
                  delivery.destination_branch.branch_id === profile.branch_id
                )
              )
          )
        );
      }

      function getCourierNextStatus(delivery) {
        if (profile.effective_role !== "courier") {
          return null;
        }

        const assignedServices = delivery.assignments
          .filter((assignment) => assignment.courier_id === profile.employee_id)
          .map((assignment) => assignment.service_type);

        const nextCode =
          delivery.current_status.code === "COURIER_ASSIGNED" && assignedServices.includes("pickup")
            ? "COURIER_PICKED_UP"
            : delivery.current_status.code === "AT_DESTINATION_BRANCH" && assignedServices.includes("delivery")
              ? "COURIER_DELIVERING_RECIPIENT"
              : delivery.current_status.code === "COURIER_DELIVERING_RECIPIENT" && assignedServices.includes("delivery")
                ? "COURIER_DELIVERED"
                : null;

        return nextCode ? currentStatuses.find((status) => status.code === nextCode) : null;
      }

      function renderCourierActions(delivery) {
        const nextCourierStatus = getCourierNextStatus(delivery);
        courierActions.innerHTML = [
          canSelfAssignDelivery(delivery)
            ? `<button class="inline-button" data-self-assign="${delivery.delivery_id}">Взять доставку</button>`
            : "",
          nextCourierStatus
            ? `<button class="inline-button" data-next-status="${delivery.delivery_id}" data-status-id="${nextCourierStatus.status_id}">${nextCourierStatus.name}</button>`
            : "",
        ].join("");
      }

      function renderHistory(history) {
        historyList.innerHTML = history
          .map(
            (item) => `
              <article class="list-item">
                <strong>${item.old_status ? item.old_status.name : "Создание"} → ${item.new_status.name}</strong><br />
                <span class="muted">${new Date(item.changed_at).toLocaleString()}</span><br />
                ${item.comment || "Без комментария"}
              </article>
            `
          )
          .join("");
      }

      function getAllowedNextStatusCodes(delivery) {
        const currentCode = delivery.current_status.code;
        const hasCourierRequests = delivery.assignments.length > 0;
        const hasPickupRequests = delivery.assignments.some((assignment) => assignment.service_type === "pickup");
        const hasOpenPickupRequests = delivery.assignments.some(
          (assignment) => assignment.service_type === "pickup" && assignment.courier_id === null
        );
        const hasDeliveryRequests = delivery.assignments.some((assignment) => assignment.service_type === "delivery");
        const hasOpenDeliveryRequests = delivery.assignments.some(
          (assignment) => assignment.service_type === "delivery" && assignment.courier_id === null
        );
        const sameBranchRoute = delivery.origin_branch.branch_id === delivery.destination_branch.branch_id;

        if (["DELIVERED", "CANCELLED"].includes(currentCode)) {
          return [];
        }
        if (
          profile.effective_role === "courier" &&
          !["COURIER_ASSIGNED", "AT_DESTINATION_BRANCH", "COURIER_DELIVERING_RECIPIENT"].includes(currentCode)
        ) {
          return [];
        }
        if (currentCode === "CREATED") {
          return ["REGISTERED", "PROCESSING", "CANCELLED"];
        }
        if (["REGISTERED", "PROCESSING"].includes(currentCode)) {
          return hasPickupRequests ? ["WAITING_COURIER", "CANCELLED"] : ["AT_ORIGIN_BRANCH", "CANCELLED"];
        }
        if (currentCode === "WAITING_COURIER") {
          return ["CANCELLED"];
        }
        if (currentCode === "COURIER_ASSIGNED") {
          const isAssignedToCurrentCourier = delivery.assignments.some(
            (assignment) => assignment.service_type === "pickup" && assignment.courier_id === profile.employee_id
          );
          if (profile.effective_role === "courier") {
            return isAssignedToCurrentCourier ? ["COURIER_PICKED_UP"] : [];
          }
          return ["CANCELLED"];
        }
        if (currentCode === "COURIER_PICKED_UP") {
          return profile.effective_role === "courier" ? [] : ["AT_ORIGIN_BRANCH", "CANCELLED"];
        }
        if (currentCode === "AT_ORIGIN_BRANCH") {
          return sameBranchRoute ? ["AT_DESTINATION_BRANCH", "CANCELLED"] : ["IN_TRANSIT", "CANCELLED"];
        }
        if (currentCode === "IN_TRANSIT") {
          return ["AT_DESTINATION_BRANCH", "CANCELLED"];
        }
        if (currentCode === "AT_DESTINATION_BRANCH") {
          const isAssignedToCurrentCourier = delivery.assignments.some(
            (assignment) => assignment.service_type === "delivery" && assignment.courier_id === profile.employee_id
          );
          if (profile.effective_role === "courier") {
            return isAssignedToCurrentCourier && !hasOpenDeliveryRequests ? ["COURIER_DELIVERING_RECIPIENT"] : [];
          }
          if (hasDeliveryRequests) {
            return hasOpenDeliveryRequests ? ["CANCELLED"] : ["CANCELLED"];
          }
          return ["DELIVERED", "CANCELLED"];
        }
        if (currentCode === "COURIER_DELIVERING_RECIPIENT") {
          const isAssignedToCurrentCourier = delivery.assignments.some(
            (assignment) => assignment.service_type === "delivery" && assignment.courier_id === profile.employee_id
          );
          return profile.effective_role === "courier" && isAssignedToCurrentCourier ? ["COURIER_DELIVERED"] : [];
        }
        if (currentCode === "COURIER_DELIVERED") {
          return profile.effective_role === "courier" ? [] : ["DELIVERED", "CANCELLED"];
        }
        return [];
      }

      function canSetStatusForBranch(statusCode, delivery) {
        if (profile.effective_role !== "employee") {
          return true;
        }
        if (statusCode === "AT_ORIGIN_BRANCH") {
          return profile.branch_id === delivery.origin_branch.branch_id;
        }
        if (statusCode === "AT_DESTINATION_BRANCH") {
          return profile.branch_id === delivery.destination_branch.branch_id;
        }
        return true;
      }

      function renderStatusForm(delivery, statuses) {
        const allowedCodes = getAllowedNextStatusCodes(delivery);
        const allowedStatuses = statuses.filter(
          (item) => allowedCodes.includes(item.code) && canSetStatusForBranch(item.code, delivery)
        );

        if (!allowedStatuses.length) {
          statusSection.classList.add("hidden");
          return;
        }

        statusSelect.innerHTML = allowedStatuses
          .map((item) => `<option value="${item.status_id}">${item.name}</option>`)
          .join("");
        statusSection.classList.remove("hidden");
      }

      async function loadPage() {
        hideMessage(message);
        try {
          const requests = [api.getDelivery(deliveryId), api.getHistory(deliveryId)];
          if (profile.permissions.can_update_status) {
            requests.push(api.listStatuses());
          }
          const [delivery, history, statuses = []] = await Promise.all(requests);
          currentDelivery = delivery;
          currentStatuses = statuses;

          renderDelivery(delivery);
          renderParticipants(delivery);
          renderAssignments(delivery.assignments);
          renderCourierActions(delivery);
          renderHistory(history);
          const canRequestRecipientCourier =
            profile.client_id === delivery.recipient_client_id && !delivery.recipient_courier_required;
          courierRequestSection.classList.toggle("hidden", !canRequestRecipientCourier);
          syncRecipientCourierCity(delivery);

          if (profile.permissions.can_update_status) {
            renderStatusForm(delivery, statuses);
          }
        } catch (error) {
          showMessage(message, error.message, "error");
        }
      }

      statusForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        hideMessage(message);
        try {
          const payload = Object.fromEntries(new FormData(statusForm).entries());
          payload.new_status_id = Number(payload.new_status_id);
          await api.updateDeliveryStatus(deliveryId, payload);
          showMessage(message, "Статус обновлен", "success");
          await loadPage();
        } catch (error) {
          showMessage(message, error.message, "error");
        }
      });

      courierActions.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-self-assign], [data-next-status]");
        if (!button) {
          return;
        }

        hideMessage(message);
        button.disabled = true;
        try {
          if (button.dataset.selfAssign) {
            await api.selfAssignDelivery(Number(button.dataset.selfAssign));
            showMessage(message, "Доставка назначена вам", "success");
          } else {
            await api.updateDeliveryStatus(Number(button.dataset.nextStatus), {
              new_status_id: Number(button.dataset.statusId),
              comment: "",
            });
            showMessage(message, "Статус обновлен", "success");
          }
          await loadPage();
        } catch (error) {
          showMessage(message, error.message, "error");
        } finally {
          button.disabled = false;
        }
      });

      courierRequestForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        hideMessage(message);
        try {
          syncRecipientCourierCity(currentDelivery);
          const entries = new FormData(courierRequestForm);
          await api.requestRecipientCourier(deliveryId, {
            recipient_address: {
              city: entries.get("city"),
              street: entries.get("street"),
              house: entries.get("house"),
              apartment: entries.get("apartment") || "",
              postal_code: entries.get("postal_code"),
              comment: entries.get("comment") || "",
            },
          });
          showMessage(message, "Курьерская доставка для получателя запрошена", "success");
          courierRequestForm.reset();
          await loadPage();
        } catch (error) {
          showMessage(message, error.message, "error");
        }
      });

      loadPage();
    </script>
  </body>
</html>
